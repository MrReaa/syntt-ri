<!DOCTYPE html>
<html>
<head>
  <title>Hyvää syntymäpäivää!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#ffe4e1; font-family:sans-serif;">

  <div style="text-align:center;">
    <h1>🎉 Hyvää syntymäpäivää! 🎂</h1>
    <p>Toivottavasti päiväsi on mahtava!</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    // Käytetään varmemmin toimivaa tapaa
    setTimeout(() => {
      confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
      });
    }, 300);
  </script>

</body>
</html>
